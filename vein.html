<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="血管 — 跟随它继续生长。Goddead.">
    <title>血管 // Goddead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=11">
  </head>
  <body class="chamber chamber--vein">
    <canvas id="vein-canvas" aria-label="血管网络画布"></canvas>
    <div class="chamber-vignette" aria-hidden="true"></div>
    <div class="chamber-scripture chamber-scripture--left" aria-hidden="true">血 脉 延 伸 无 名 生 长</div>
    <div class="chamber-scripture chamber-scripture--right" aria-hidden="true">VEIN · CRESCERE · SANGUIS</div>

    <header class="vein-ui">
      <div class="chamber-frame">
        <p class="chamber-kicker"><b>02</b><i></i><em></em></p>
        <h1 class="chamber-title">血 管</h1>
        <p class="chamber-whisper">移动引诱生长。点击播下种子。</p>
        <div class="chamber-divider" aria-hidden="true"></div>
      </div>
    </header>

    <footer class="chamber-footer">
      <a class="chamber-back" href="index.html">返回祭坛</a>
      <p class="chamber-status"><span class="chamber-pulse" aria-hidden="true"></span> 网络在听 · goddead.com</p>
    </footer>

    <div class="screen-grain" aria-hidden="true"></div>

    <script>
      const canvas = document.getElementById("vein-canvas");
      const ctx = canvas.getContext("2d");
      let width = (canvas.width = window.innerWidth);
      let height = (canvas.height = window.innerHeight);

      const nodes = [];
      const maxNodes = 180;
      const mouse = { x: width / 2, y: height / 2 };

      class VeinNode {
        constructor(x, y, parent = null) {
          this.x = x;
          this.y = y;
          this.parent = parent;
          this.age = 0;
          this.maxAge = 200 + Math.random() * 300;
          this.branched = false;
          this.angle = parent
            ? parent.angle + (Math.random() - 0.5) * 1.2
            : Math.random() * Math.PI * 2;
          this.speed = 0.5 + Math.random() * 1.2;
          this.width = parent ? parent.width * 0.92 : 2 + Math.random() * 2;
        }

        update() {
          this.age++;
          const toMouse = Math.atan2(mouse.y - this.y, mouse.x - this.x);
          const diff = toMouse - this.angle;
          this.angle += diff * 0.015 + (Math.random() - 0.5) * 0.15;

          this.x += Math.cos(this.angle) * this.speed;
          this.y += Math.sin(this.angle) * this.speed;

          if (!this.branched && this.age > 20 + Math.random() * 30 && nodes.length < maxNodes) {
            this.branched = true;
            if (Math.random() > 0.4) {
              nodes.push(new VeinNode(this.x, this.y, this));
            }
          }
        }

        draw() {
          if (!this.parent) return;
          const alpha = Math.max(0, 1 - this.age / this.maxAge);
          ctx.beginPath();
          ctx.moveTo(this.parent.x, this.parent.y);
          ctx.lineTo(this.x, this.y);
          ctx.strokeStyle = `rgba(141, 43, 39, ${alpha * 0.72})`;
          ctx.lineWidth = Math.max(0.3, this.width * alpha);
          ctx.stroke();

          if (this.age < 50) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 1.5 * alpha, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(189, 73, 67, ${alpha * 0.9})`;
            ctx.fill();
          }
        }
      }

      for (let i = 0; i < 5; i++) {
        nodes.push(
          new VeinNode(
            width / 2 + (Math.random() - 0.5) * 60,
            height / 2 + (Math.random() - 0.5) * 60
          )
        );
      }

      function render() {
        ctx.fillStyle = "rgba(5, 5, 5, 0.06)";
        ctx.fillRect(0, 0, width, height);

        for (let i = nodes.length - 1; i >= 0; i--) {
          const n = nodes[i];
          n.update();
          n.draw();
          if (n.age > n.maxAge || n.x < 0 || n.x > width || n.y < 0 || n.y > height) {
            nodes.splice(i, 1);
          }
        }

        while (nodes.length < 40) {
          nodes.push(
            new VeinNode(
              width / 2 + (Math.random() - 0.5) * 40,
              height / 2 + (Math.random() - 0.5) * 40
            )
          );
        }

        requestAnimationFrame(render);
      }
      render();

      window.addEventListener("resize", () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      window.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      window.addEventListener("click", (e) => {
        for (let i = 0; i < 5; i++) {
          nodes.push(new VeinNode(e.clientX, e.clientY));
        }
      });

      window.addEventListener(
        "touchmove",
        (e) => {
          mouse.x = e.touches[0].clientX;
          mouse.y = e.touches[0].clientY;
        },
        { passive: true }
      );
    </script>
  </body>
</html>
