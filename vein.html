<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VEIN // Goddead</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&family=JetBrains+Mono:wght@200;400&display=swap');
      :root {
        --void: #030303;
        --bone: #c7c7c7;
        --ash: #444;
        --blood: #6b1a1a;
        --gold: #8a7340;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--void);
        overflow: hidden;
        cursor: crosshair;
      }
      #vein-canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      .vein-ui {
        position: fixed;
        top: 30px;
        left: 30px;
        z-index: 2;
        pointer-events: none;
      }
      .vein-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.35em;
        color: var(--blood);
        margin-bottom: 10px;
      }
      .vein-hint {
        font-family: 'Noto Serif SC', serif;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        color: var(--ash);
      }
      .vein-counter {
        position: fixed;
        top: 30px;
        right: 30px;
        z-index: 2;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.55rem;
        letter-spacing: 0.18em;
        color: var(--ash);
        pointer-events: none;
        text-align: right;
      }
      .back-link {
        position: fixed;
        bottom: 30px;
        left: 30px;
        color: var(--ash);
        text-decoration: none;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        z-index: 2;
        transition: color 0.4s ease;
        pointer-events: auto;
      }
      .back-link:hover {
        color: var(--blood);
      }
      .pulse {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--blood);
        box-shadow: 0 0 20px rgba(107, 26, 26, 0.5);
        animation: pulse 1.4s ease-in-out infinite;
        z-index: 2;
      }
      .vein-whisper {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        font-family: 'Noto Serif SC', serif;
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        color: var(--ash);
        opacity: 0;
        transition: opacity 1s ease;
        pointer-events: none;
        text-align: center;
      }
      .vein-whisper.visible {
        opacity: 0.6;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.5); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <canvas id="vein-canvas"></canvas>

    <div class="vein-ui">
      <div class="vein-title">血 管 网 络</div>
      <div class="vein-hint">移动引诱生长。点击播下种子。<br>血管会记住你停留最久的地方。</div>
    </div>

    <div class="vein-counter">
      <div>节 点 数 ： <span id="node-count">0</span></div>
      <div>心 跳 数 ： <span id="pulse-count">0</span></div>
    </div>

    <a class="back-link" href="index.html">[ 返 回 / RETURN ]</a>
    <div class="pulse"></div>
    <div class="vein-whisper" id="vein-whisper"></div>

    <script>
      const canvas = document.getElementById('vein-canvas');
      const ctx = canvas.getContext('2d');
      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      const nodes = [];
      const maxNodes = 220;
      const mouse = { x: width / 2, y: height / 2 };
      const heartbeats = [];
      let pulseCount = 0;
      let seedCount = 0;

      const whispers = [
        "它在你停留的地方长得更密。",
        "血管不会忘记。",
        "你正在成为网络的一部分。",
        "有些分支在寻找你的脉搏。",
        "点击是种子，移动是水源。",
        "越深的地方，血管越细。",
      ];

      class VeinNode {
        constructor(x, y, parent = null, type = 'blood') {
          this.x = x;
          this.y = y;
          this.parent = parent;
          this.type = type;
          this.age = 0;
          this.maxAge = 200 + Math.random() * 300;
          this.branched = false;
          this.angle = parent ? parent.angle + (Math.random() - 0.5) * 1.2 : Math.random() * Math.PI * 2;
          this.speed = 0.5 + Math.random() * 1.2;
          this.width = parent ? parent.width * 0.92 : 2 + Math.random() * 2;
          this.color = this.pickColor(type);
        }

        pickColor(type) {
          switch(type) {
            case 'bone': return '160, 160, 160';
            case 'gold': return '138, 115, 64';
            case 'mold': return '40, 60, 40';
            default: return '107, 26, 26';
          }
        }

        update() {
          this.age++;
          const toMouse = Math.atan2(mouse.y - this.y, mouse.x - this.x);
          const diff = toMouse - this.angle;
          this.angle += diff * 0.015 + (Math.random() - 0.5) * 0.15;

          this.x += Math.cos(this.angle) * this.speed;
          this.y += Math.sin(this.angle) * this.speed;

          if (!this.branched && this.age > 20 + Math.random() * 30 && nodes.length < maxNodes) {
            this.branched = true;
            if (Math.random() > 0.4) {
              nodes.push(new VeinNode(this.x, this.y, this, this.type));
            }
            if (Math.random() > 0.92) {
              const types = ['blood', 'bone', 'gold', 'mold'];
              nodes.push(new VeinNode(this.x, this.y, this, types[Math.floor(Math.random() * types.length)]));
            }
          }
        }

        draw() {
          if (!this.parent) return;
          const alpha = Math.max(0, 1 - this.age / this.maxAge);
          ctx.beginPath();
          ctx.moveTo(this.parent.x, this.parent.y);
          ctx.lineTo(this.x, this.y);
          ctx.strokeStyle = `rgba(${this.color}, ${alpha * 0.7})`;
          ctx.lineWidth = Math.max(0.3, this.width * alpha);
          ctx.stroke();

          if (this.age < 50) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 1.5 * alpha, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.color}, ${alpha})`;
            ctx.fill();
          }
        }
      }

      for (let i = 0; i < 5; i++) {
        nodes.push(new VeinNode(width / 2 + (Math.random() - 0.5) * 60, height / 2 + (Math.random() - 0.5) * 60));
      }

      function drawHeartbeats() {
        for (let i = heartbeats.length - 1; i >= 0; i--) {
          const h = heartbeats[i];
          h.r += 2;
          h.alpha -= 0.008;
          if (h.alpha <= 0) {
            heartbeats.splice(i, 1);
            continue;
          }
          ctx.beginPath();
          ctx.arc(h.x, h.y, h.r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(107, 26, 26, ${h.alpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      function render() {
        ctx.fillStyle = 'rgba(3, 3, 3, 0.06)';
        ctx.fillRect(0, 0, width, height);

        for (let i = nodes.length - 1; i >= 0; i--) {
          const n = nodes[i];
          n.update();
          n.draw();
          if (n.age > n.maxAge || n.x < 0 || n.x > width || n.y < 0 || n.y > height) {
            nodes.splice(i, 1);
          }
        }

        while (nodes.length < 40) {
          nodes.push(new VeinNode(width / 2 + (Math.random() - 0.5) * 40, height / 2 + (Math.random() - 0.5) * 40));
        }

        drawHeartbeats();

        document.getElementById('node-count').textContent = nodes.length;
        document.getElementById('pulse-count').textContent = pulseCount;

        requestAnimationFrame(render);
      }
      render();

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      window.addEventListener('click', (e) => {
        const types = ['blood', 'blood', 'blood', 'bone', 'gold', 'mold'];
        const type = types[Math.floor(Math.random() * types.length)];
        for (let i = 0; i < 5; i++) {
          nodes.push(new VeinNode(e.clientX, e.clientY, null, type));
        }
        heartbeats.push({ x: e.clientX, y: e.clientY, r: 10, alpha: 0.6 });
        pulseCount++;
        seedCount++;

        if (seedCount === 7) {
          showWhisper("七颗种子。血管开始记住你的节奏。");
        } else if (seedCount === 13) {
          showWhisper("十三颗种子。你已经成为这片土壤的一部分。");
        } else if (seedCount % 5 === 0) {
          showWhisper(whispers[Math.floor(Math.random() * whispers.length)]);
        }
      });

      window.addEventListener('touchmove', (e) => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }, { passive: true });

      function showWhisper(text) {
        const el = document.getElementById('vein-whisper');
        if (!el) return;
        el.textContent = text;
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 4000);
      }
    </script>
  </body>
</html>
