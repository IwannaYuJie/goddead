<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="Goddead.com — 神已经死去。你仍然抵达。">
    <title>Goddead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="preload" href="assets/hero.png" as="image">
    <link rel="preload" href="assets/testament-left.png" as="image">
    <link rel="preload" href="assets/testament-gates.png" as="image">
    <link rel="stylesheet" href="styles.css?v=10">
  </head>
  <body>
    <img class="compatibility-asset" src="assets/hero.png" alt="">

    <main class="testament" aria-label="Goddead 仪式入口">
      <section class="wordmark-panel" aria-labelledby="site-title">
        <div class="wordmark-art" aria-hidden="true"></div>
        <div class="scripture scripture--top" aria-hidden="true">神 死 空 缺 寂 静 回 声 神 死 空 缺 寂 静 回 声</div>
        <div class="scripture scripture--side" aria-hidden="true">DEUS · MORTUUS · SILENTIUM</div>

        <h1 class="wordmark" id="site-title" aria-label="GOD DEAD">
          <span class="wordmark-row wordmark-row--god">GOD</span>
          <span class="wordmark-row wordmark-row--dead">DEAD</span>
        </h1>

        <div class="seam" aria-hidden="true"><span></span></div>

        <p class="arrival-line">
          <span>祂已经死去。</span>
          <span>你仍然抵达。</span>
        </p>

        <button class="cross-mark" id="cross-mark" type="button" aria-label="记录一次抵达">＋</button>
        <p class="latin-mark" aria-hidden="true">S I L E N T I U M</p>
      </section>

      <section class="gate-panel" aria-label="选择仪式入口">
        <div class="gate-art" aria-hidden="true"></div>

        <button class="menu-trigger" id="menu-trigger" type="button" aria-expanded="false" aria-controls="ritual-menu" aria-label="打开目录">
          <span></span><span></span>
        </button>

        <nav class="gate-list" aria-label="三道仪式">
          <a class="gate-link" href="echo.html" data-gate="echo">
            <span class="gate-meta"><b>01</b><i></i><em></em></span>
            <span class="gate-name">回声</span>
            <span class="gate-whisper">说过的会回来</span>
          </a>
          <a class="gate-link" href="vein.html" data-gate="vein">
            <span class="gate-meta"><b>02</b><i></i><em></em></span>
            <span class="gate-name">血管</span>
            <span class="gate-whisper">跟随它继续生长</span>
          </a>
          <a class="gate-link" href="confession.html" data-gate="confession">
            <span class="gate-meta"><b>03</b><i></i><em></em></span>
            <span class="gate-name">忏悔</span>
            <span class="gate-whisper">留下一个重量</span>
          </a>
        </nav>

        <div class="touch-ritual">
          <p><span aria-hidden="true">⊙</span> 触 碰 红 点</p>
          <span class="touch-line" aria-hidden="true"></span>
          <button class="ritual-point" id="ritual-point" type="button" aria-label="触碰红点，唤醒祭坛">
            <span></span>
          </button>
        </div>

        <p class="status-line" id="status-line" aria-live="polite">信号沉睡 · 等待触碰</p>
        <a class="domain-mark" href="https://github.com/IwannaYuJie/goddead">goddead.com</a>
      </section>
    </main>

    <aside class="ritual-menu" id="ritual-menu" aria-hidden="true">
      <button class="menu-close" id="menu-close" type="button" aria-label="关闭目录">关闭</button>
      <p class="menu-kicker">THE REMAINS</p>
      <a href="echo.html">01 / 回声</a>
      <a href="vein.html">02 / 血管</a>
      <a href="confession.html">03 / 忏悔</a>
      <a href="reliquary.html" id="reliquary-link">00 / 遗物室</a>
      <p class="menu-note">所有入口都通往同一个空缺。</p>
    </aside>

    <div class="screen-grain" aria-hidden="true"></div>
    <div class="arrival-message" id="arrival-message" role="status" aria-live="polite"></div>
    <script src="script.js?v=10"></script>
  </body>
</html>
