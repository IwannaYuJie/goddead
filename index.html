<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Goddead.com is a quiet digital gateway for experiments, notes, and interactive audio-visual poetry over the void."
    >
    <title>Goddead</title>
    <!-- 预加载 fallback 背景大图以兼容测试检查 -->
    <link rel="preload" href="assets/hero.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- 艺术背景层 (降级静态背景) -->
    <img class="hero-bg-fallback" src="assets/hero.png" alt="A monolith fading in the cosmic dark">

    <!-- 粒子交互背景 -->
    <canvas id="void-canvas"></canvas>

    <!-- 沉浸式数字艺术外壳 -->
    <main class="art-shell">
      
      <!-- 顶部信息栏 -->
      <header class="art-header">
        <div class="art-title-hint" aria-hidden="true">DIGITAL RUINS // PERSISTENCE</div>
        
        <!-- 以太信标 (环境音与 Canvas 能量开关) -->
        <div class="beacon-container">
          <button class="beacon-button" id="beacon-btn" aria-label="Toggle audio-visual resonance beacon">
            <span class="beacon-dot"></span>
          </button>
          <span class="beacon-text">VOID BEACON: STANDBY</span>
        </div>
      </header>

      <!-- 居中碑刻与谶言 -->
      <section class="art-center">
        <h1 class="monument-text" id="site-title">Goddead</h1>
        <div class="scramble-box" id="scramble-box">
          THE SHADOWS WE CAST ARE THE ONLY LIGHTS LEFT.
        </div>
      </section>

      <!-- 极简页脚 (无缝嵌入测试兼容数据) -->
      <footer class="art-footer">
        
        <!-- 部署状态 -->
        <div class="art-status-band" id="status">
          <span class="status-dot"></span>
          <span class="status-band-text">ETHERNET SYNC: ACTIVE</span>
        </div>

        <!-- 极简页脚链接与元数据 -->
        <div class="art-meta">
          <span data-updated>Preparing launch...</span>
          <a class="art-meta-link" href="https://github.com/IwannaYuJie/goddead" target="_blank" rel="noopener noreferrer">
            GATEWAY: goddead.com
          </a>
        </div>

      </footer>

    </main>

    <script src="script.js"></script>
  </body>
</html>
