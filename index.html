<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Goddead.com — a ritual of absence, an altar built from the silence after the divine."
    >
    <title>Goddead</title>
    <link rel="preload" href="assets/hero.png" as="image">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <img class="void-texture" src="assets/hero.png" alt="">
    <canvas id="void-canvas"></canvas>
    <canvas id="corruption-canvas" aria-hidden="true"></canvas>
    <div class="void-noise" aria-hidden="true"></div>
    <div class="void-vignette" aria-hidden="true"></div>
    <div class="screen-flicker" aria-hidden="true"></div>

    <main class="altar">
      <header class="altar-header">
        <div class="altar-sigil" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="audio-status-box" aria-live="polite">
          <span class="audio-pulse-dot"></span>
          <span id="audio-status-text">信 号：关 闭</span>
        </div>
      </header>

      <section class="ritual-stage" id="ritual-stage" aria-label="Ritual">
        <div class="breath" id="breath" aria-hidden="true"></div>

        <div class="stage stage--0 active" data-stage="0">
          <p class="whisper">祂正在死去。</p>
        </div>

        <div class="stage stage--1" data-stage="1">
          <p class="invocation" id="invocation-line"></p>
        </div>

        <div class="stage stage--2" data-stage="2">
          <h1 class="goddead-title glitch-layer" id="site-title" aria-label="Goddead" data-text="GODDEAD">
            <span class="title-half title-half--flesh">GOD</span>
            <span class="title-half title-half--bone">DEAD</span>
          </h1>
        </div>

        <div class="stage stage--3" data-stage="3">
          <p class="gate-question">你 选 择 哪 一 种 缺 席 ？</p>
          <nav class="gate-grid" aria-label="Gates">
            <a class="gate" href="echo.html">
              <span class="gate-num">I</span>
              <span class="gate-name">回 声</span>
              <span class="gate-hint">说过的会回来</span>
            </a>
            <a class="gate" href="vein.html">
              <span class="gate-num">II</span>
              <span class="gate-name">血 管</span>
              <span class="gate-hint">跟随生长</span>
            </a>
            <a class="gate" href="confession.html">
              <span class="gate-num">III</span>
              <span class="gate-name">忏 悔</span>
              <span class="gate-hint">留下一个重量</span>
            </a>
          </nav>
        </div>
      </section>

      <footer class="altar-footer" id="status">
        <div class="altar-status">
          <span class="status-dot"></span>
          <span class="status-band-text">存 在：空</span>
        </div>
        <div class="altar-meta">
          <span data-updated>准备传输...</span>
          <a class="altar-meta-link" href="https://github.com/IwannaYuJie/goddead" target="_blank" rel="noopener noreferrer">
            goddead.com
          </a>
        </div>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
