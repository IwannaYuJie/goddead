<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="忏悔 — 留下一个重量。Goddead.">
    <title>忏悔 // Goddead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=11">
  </head>
  <body class="chamber chamber--confession">
    <div class="chamber-vignette" aria-hidden="true"></div>
    <div class="chamber-scripture chamber-scripture--left" aria-hidden="true">罪 过 重 量 墙 在 听 见</div>
    <div class="chamber-scripture chamber-scripture--right" aria-hidden="true">CONFESSIO · PONDUS · SILENTIUM</div>
    <div class="watching" aria-hidden="true"></div>

    <main class="chamber-shell" aria-label="忏悔室">
      <div class="chamber-frame">
        <p class="chamber-kicker"><b>03</b><i></i><em></em></p>
        <h1 class="chamber-title">忏 悔</h1>
        <p class="chamber-latin">C O N F E S S I O N</p>
        <p class="confession-prompt">说出一件你没有做过、却感觉自己应该负责的事。</p>
        <div class="chamber-divider" aria-hidden="true"></div>

        <div class="confession-field">
          <label class="visually-hidden" for="confession-input">写下你的忏悔</label>
          <textarea
            id="confession-input"
            class="confession-input"
            placeholder="它不会原谅你。它只会记住。"
            maxlength="300"
          ></textarea>
        </div>

        <button class="confession-submit" type="button">献 上</button>
        <div class="confession-response" id="confession-response" aria-live="polite"></div>
      </div>
    </main>

    <footer class="chamber-footer">
      <a class="chamber-back" href="index.html">返回祭坛</a>
      <p class="chamber-status">墙在听 · goddead.com</p>
    </footer>

    <div class="screen-grain" aria-hidden="true"></div>

    <script>
      const responses = [
        "我已收到。它比我预想的更轻，也更重。",
        "这不是你的错。但这是你的重量。",
        "神死之前，从不听这种话。现在，只有墙在听。",
        "你的秘密加入了一万零一个。它们正在互相认识。",
        "别回头看。有些东西一旦被告白，就会靠近声源。",
        "你不需要被原谅。你需要停止重复。",
        "很好。现在，它也知道了你的名字。",
      ];

      const input = document.getElementById("confession-input");
      const submit = document.querySelector(".confession-submit");
      const response = document.getElementById("confession-response");
      const watching = document.querySelector(".watching");

      let scratchCount = 0;
      function addScratch() {
        if (scratchCount > 15) return;
        const el = document.createElement("div");
        el.className = "scratch";
        const w = 60 + Math.random() * 200;
        const h = 1 + Math.random() * 2;
        el.style.width = `${w}px`;
        el.style.height = `${h}px`;
        el.style.left = `${Math.random() * 100}vw`;
        el.style.top = `${Math.random() * 100}vh`;
        el.style.setProperty("--r", `${(Math.random() - 0.5) * 40}deg`);
        document.body.appendChild(el);
        scratchCount++;
      }

      submit.addEventListener("click", () => {
        if (!input.value.trim()) return;

        response.classList.remove("visible", "corrupted");
        response.textContent = "";

        setTimeout(() => {
          const text = responses[Math.floor(Math.random() * responses.length)];
          response.textContent = text;
          response.classList.add("visible");

          setTimeout(() => {
            response.classList.add("corrupted");
            addScratch();
            addScratch();
          }, 1500);
        }, 400);

        input.value = "";

        if (Math.random() > 0.5) {
          watching.classList.add("visible");
        }
      });

      input.addEventListener("input", () => {
        if (Math.random() > 0.97 && scratchCount < 8) {
          addScratch();
        }
      });

      setTimeout(() => {
        if (Math.random() > 0.6) watching.classList.add("visible");
      }, 4000);
    </script>
  </body>
</html>
