<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Goddead Design QA Comparison</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; background: #151515; color: #ddd; font: 12px sans-serif; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; min-height: 100vh; }
      figure { margin: 0; display: grid; grid-template-rows: 28px 1fr; background: #050505; }
      figcaption { padding: 7px 10px; background: #201b1a; letter-spacing: .12em; }
      img { display: block; width: 100%; height: auto; aspect-ratio: 1440 / 1024; object-fit: contain; object-position: top; }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <figcaption>SOURCE — SELECTED OPTION 3</figcaption>
        <img src="../design-references/selected-option-3.png" alt="Selected visual target">
      </figure>
      <figure>
        <figcaption>IMPLEMENTATION — FINAL DESKTOP</figcaption>
        <img src="implementation-desktop-final.png" alt="Final desktop implementation">
      </figure>
    </main>
  </body>
</html>
