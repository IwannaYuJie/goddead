<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050505">
    <meta name="description" content="回声 — 说过的会回来。Goddead.">
    <title>回声 // Goddead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+SC:wght@300;400;500&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=11">
  </head>
  <body class="chamber chamber--echo">
    <canvas id="stain-canvas" aria-hidden="true"></canvas>
    <div class="chamber-vignette" aria-hidden="true"></div>
    <div class="chamber-scripture chamber-scripture--left" aria-hidden="true">神 死 空 缺 寂 静 回 声</div>
    <div class="chamber-scripture chamber-scripture--right" aria-hidden="true">ECHO · RESONARE · VACUUM</div>

    <main class="chamber-shell" aria-label="回声房间">
      <div class="chamber-frame">
        <p class="chamber-kicker"><b>01</b><i></i><em></em></p>
        <h1 class="chamber-title">回 声</h1>
        <p class="chamber-latin">E C H O &nbsp;·&nbsp; C H A M B E R</p>
        <p class="chamber-whisper">说过的会回来。有些会先学会你的声音。</p>
        <div class="chamber-divider" aria-hidden="true"></div>

        <label class="visually-hidden" for="echo-input">输入将要回响的话</label>
        <input
          id="echo-input"
          class="echo-input"
          type="text"
          placeholder="说些什么，然后听它回来"
          autocomplete="off"
          autofocus
        >

        <div class="echo-chamber" id="echo-chamber" aria-live="polite"></div>
      </div>
    </main>

    <footer class="chamber-footer">
      <a class="chamber-back" href="index.html">返回祭坛</a>
      <p class="chamber-status">它学得很快 · goddead.com</p>
    </footer>

    <div class="screen-grain" aria-hidden="true"></div>

    <script>
      const canvas = document.getElementById("stain-canvas");
      const ctx = canvas.getContext("2d");
      let width = (canvas.width = window.innerWidth);
      let height = (canvas.height = window.innerHeight);

      const stains = [];
      for (let i = 0; i < 8; i++) {
        stains.push({
          x: Math.random() * width,
          y: Math.random() * height,
          r: 20 + Math.random() * 80,
          grow: 0.1 + Math.random() * 0.3,
          alpha: 0.02 + Math.random() * 0.04,
          color: Math.random() > 0.5 ? "74, 15, 15" : "26, 37, 26",
        });
      }

      function drawStains() {
        ctx.fillStyle = "rgba(5, 5, 5, 0.08)";
        ctx.fillRect(0, 0, width, height);
        stains.forEach((s) => {
          s.r += s.grow;
          if (s.r > Math.max(width, height) * 0.4) {
            s.r = 20 + Math.random() * 80;
            s.x = Math.random() * width;
            s.y = Math.random() * height;
          }
          const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
          g.addColorStop(0, `rgba(${s.color}, ${s.alpha})`);
          g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
        requestAnimationFrame(drawStains);
      }
      drawStains();

      window.addEventListener("resize", () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      const input = document.getElementById("echo-input");
      const chamber = document.getElementById("echo-chamber");

      const corruptions = ["空洞", "饥饿", "寂静", "缺席", "腐烂", "无名", "影子", "门后"];

      function corrupt(text) {
        const chars = Array.from(text);
        const positions = [];
        while (positions.length < Math.min(3, Math.floor(chars.length / 3))) {
          const p = Math.floor(Math.random() * chars.length);
          if (!positions.includes(p)) positions.push(p);
        }
        positions
          .sort((a, b) => b - a)
          .forEach((p) => {
            if (chars[p] !== " " && chars[p] !== "，" && chars[p] !== "。") {
              chars[p] = corruptions[Math.floor(Math.random() * corruptions.length)][0];
            }
          });
        let result = chars.join("");
        if (Math.random() > 0.6) result += "。";
        if (Math.random() > 0.7) result = result.split("").reverse().join("");
        return result;
      }

      function addEcho(text, delay = 0) {
        setTimeout(() => {
          const line = document.createElement("div");
          line.className = "echo-line";
          line.textContent = text;
          chamber.appendChild(line);

          requestAnimationFrame(() => {
            line.classList.add("visible");
          });

          setTimeout(() => {
            line.classList.add("corrupted");
            line.textContent = corrupt(text);
          }, 1200 + Math.random() * 1500);

          if (chamber.children.length > 6) {
            chamber.removeChild(chamber.firstChild);
          }
        }, delay);
      }

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && input.value.trim()) {
          const value = input.value.trim();
          addEcho(value);
          for (let i = 1; i <= 3; i++) {
            addEcho(value, i * 900 + Math.random() * 400);
          }
          input.value = "";
        }
      });

      document.addEventListener("mousemove", (e) => {
        if (Math.random() > 0.92) {
          stains.push({
            x: e.clientX,
            y: e.clientY,
            r: 5 + Math.random() * 15,
            grow: 0.2 + Math.random() * 0.4,
            alpha: 0.08 + Math.random() * 0.08,
            color: "141, 43, 39",
          });
          if (stains.length > 25) stains.shift();
        }
      });
    </script>
  </body>
</html>
